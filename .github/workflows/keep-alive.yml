name: Keep Render Alive

on:
  schedule:
    # Ping every 10 minutes to prevent Render free tier cold starts (15 min timeout)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://CaseHacks-Portal.onrender.com/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Server is alive."
          else
            echo "Warning: unexpected status $STATUS"
          fi